<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Gold rounded-square background -->
  <rect width="32" height="32" rx="6" fill="#BF9D6A"/>
  <!-- Outer octagon frame -->
  <polygon points="10,2 22,2 30,10 30,22 22,30 10,30 2,22 2,10"
           fill="none" stroke="#FAF7F2" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Inner diamond -->
  <polygon points="16,8 24,16 16,24 8,16"
           fill="none" stroke="#FAF7F2" stroke-width="1.4"/>
  <!-- Cardinal spokes (octagon edge midpoints → inner diamond) -->
  <line x1="16" y1="2"  x2="16" y2="8"  stroke="#FAF7F2" stroke-width="1.2"/>
  <line x1="16" y1="24" x2="16" y2="30" stroke="#FAF7F2" stroke-width="1.2"/>
  <line x1="2"  y1="16" x2="8"  y2="16" stroke="#FAF7F2" stroke-width="1.2"/>
  <line x1="24" y1="16" x2="30" y2="16" stroke="#FAF7F2" stroke-width="1.2"/>
  <!-- Diagonal connectors (octagon corners → diamond corners) -->
  <line x1="11" y1="3.5"  x2="13" y2="9.5"  stroke="#FAF7F2" stroke-width="1"/>
  <line x1="21" y1="3.5"  x2="19" y2="9.5"  stroke="#FAF7F2" stroke-width="1"/>
  <line x1="28.5" y1="11" x2="22.5" y2="13" stroke="#FAF7F2" stroke-width="1"/>
  <line x1="28.5" y1="21" x2="22.5" y2="19" stroke="#FAF7F2" stroke-width="1"/>
  <line x1="21" y1="28.5" x2="19" y2="22.5" stroke="#FAF7F2" stroke-width="1"/>
  <line x1="11" y1="28.5" x2="13" y2="22.5" stroke="#FAF7F2" stroke-width="1"/>
  <line x1="3.5" y1="21"  x2="9.5"  y2="19" stroke="#FAF7F2" stroke-width="1"/>
  <line x1="3.5" y1="11"  x2="9.5"  y2="13" stroke="#FAF7F2" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#FAF7F2"/>
</svg>
