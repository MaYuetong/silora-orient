<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Outer octagon frame (菱花窗棂) -->
  <polygon points="10,2 22,2 30,10 30,22 22,30 10,30 2,22 2,10"
           fill="none" stroke="#2A2724" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner diamond -->
  <polygon points="16,7 25,16 16,25 7,16"
           fill="none" stroke="#2A2724" stroke-width="1.2"/>
  <!-- Center small square (rotated 45°) -->
  <polygon points="16,13 19,16 16,19 13,16"
           fill="#2A2724"/>
  <!-- Cardinal spokes — octagon midpoints to inner diamond -->
  <line x1="16" y1="2"  x2="16" y2="7"  stroke="#2A2724" stroke-width="1"/>
  <line x1="16" y1="25" x2="16" y2="30" stroke="#2A2724" stroke-width="1"/>
  <line x1="2"  y1="16" x2="7"  y2="16" stroke="#2A2724" stroke-width="1"/>
  <line x1="25" y1="16" x2="30" y2="16" stroke="#2A2724" stroke-width="1"/>
  <!-- Diagonal spokes — octagon corners to inner diamond corners -->
  <line x1="10" y1="2"  x2="10" y2="2"  stroke="none"/>
  <line x1="10.5" y1="3.5"  x2="12.5" y2="9.5"   stroke="#2A2724" stroke-width="0.9"/>
  <line x1="21.5" y1="3.5"  x2="19.5" y2="9.5"   stroke="#2A2724" stroke-width="0.9"/>
  <line x1="28.5" y1="10.5" x2="22.5" y2="12.5"  stroke="#2A2724" stroke-width="0.9"/>
  <line x1="28.5" y1="21.5" x2="22.5" y2="19.5"  stroke="#2A2724" stroke-width="0.9"/>
  <line x1="21.5" y1="28.5" x2="19.5" y2="22.5"  stroke="#2A2724" stroke-width="0.9"/>
  <line x1="10.5" y1="28.5" x2="12.5" y2="22.5"  stroke="#2A2724" stroke-width="0.9"/>
  <line x1="3.5"  y1="21.5" x2="9.5"  y2="19.5"  stroke="#2A2724" stroke-width="0.9"/>
  <line x1="3.5"  y1="10.5" x2="9.5"  y2="12.5"  stroke="#2A2724" stroke-width="0.9"/>
</svg>
